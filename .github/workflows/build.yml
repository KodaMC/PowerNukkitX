name: PNX Build

on:
  push:
  pull_request:

jobs:
  check-files:
    name: Check repository files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    outputs:
      changed-files: ${{ steps.check-changed-files.outputs.all_changed_and_modified_files }}

    steps:
      - name: Checkout repository contents
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for file changes
        id: check-changed-files
        uses: tj-actions/changed-files@v47

      - name: Output list of changed files
        run: echo "${{ steps.check-changed-files.outputs.all_changed_and_modified_files }}"

  build-server:
    name: Build PNX Server
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [check-files]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      # 🔍 Optional but useful for debugging
      - name: List Gradle tasks
        run: ./gradlew tasks

      # ✅ Build FAT JAR (this is the real fix)
      - name: Build PNX Server (fat jar)
        run: ./gradlew clean shadowJar --no-configuration-cache

      # 🔍 Show what got built (helps debugging size issues)
      - name: List build outputs
        run: ls -lh build/libs

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: powernukkitx
          path: |
            build/libs/*-all.jar
            build/libs/*.jar
