name: PNX Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Build PowerNukkitX
        run: ./gradlew clean build -x test --no-configuration-cache

      - name: List all JARs
        run: find . -type f -name "*.jar" -exec ls -lh {} \;
        
      - name: Locate main JAR
        id: find_jar
        run: |
          JAR=$(find . -type f -name "*.jar" \
            ! -name "*sources*" \
            ! -name "*javadoc*" \
            ! -name "*tests*" \
            ! -name "*plain*" \
            -exec ls -lh {} \; | sort -k5 -hr | head -n 1 | awk '{print $9}')

          if [ -z "$JAR" ]; then
            echo "No valid jar found!"
            exit 1
          fi

          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Selected JAR: $JAR"

      - name: Upload PowerNukkitX JAR
        uses: actions/upload-artifact@v4
        with:
          name: powernukkitx
          path: ${{ steps.find_jar.outputs.jar_path }}
