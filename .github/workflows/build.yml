name: PNX Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      # ✅ Build the CORRECT jar (fat jar ~60MB)
      - name: Build PowerNukkitX
        run: ./gradlew clean shadowJar --no-configuration-cache

      # 🔍 Ensure correct file is picked
      - name: Locate fat JAR
        id: find_jar
        run: |
          JAR=$(ls build/libs/*-all.jar | head -n 1)
          if [ -z "$JAR" ]; then
            echo "No fat jar found!"
            exit 1
          fi
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Found: $JAR"

      # 📦 Optional artifact (for Actions tab)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: powernukkitx
          path: ${{ steps.find_jar.outputs.jar_path }}

      # 🚀 Publish to GitHub Releases (REAL GOAL)
      - name: Publish snapshot release
        uses: xotl/cool-github-releases@v1.1.10
        with:
          mode: update
          tag_name: snapshot
          release_name: "Latest Snapshot"
          assets: ${{ steps.find_jar.outputs.jar_path }}
          replace_assets: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
