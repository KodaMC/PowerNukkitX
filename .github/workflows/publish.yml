name: PowerNukkitX Publish

on:
  push:
  pull_request:

jobs:
  move-tag:
    name: Move snapshot tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository) && contains(github.ref_name, 'master')

    steps:
      - name: Move CI tag
        run: |
          mkdir repo
          git clone -b "$BRANCH_NAME" "https://github.com/${GITHUB_REPOSITORY}" repo
          cd repo
          bash .github/workflows/move-tag.sh "snapshot" "Last commit build by the CI"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

  check-files:
    name: Check repository files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository)
    outputs:
      changed-files: ${{ steps.check-changed-files.outputs.all_changed_and_modified_files }}

    steps:
      - name: Check out repository contents
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for file changes
        id: check-changed-files
        uses: tj-actions/changed-files@e0021407031f5be11a464abee9a0776171c79891

      - name: Output list of changed files
        run: echo "${{ steps.check-changed-files.outputs.all_changed_and_modified_files }}"

  build-and-publish:
    name: Build and Publish PNX
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [move-tag, check-files]

    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build PNX & Publish to repository
        run: ./gradlew clean publish --no-configuration-cache
        env:
          PNX_REPO_USERNAME: ${{ secrets.PNX_REPO_USERNAME }}
          PNX_REPO_PASSWORD: ${{ secrets.PNX_REPO_PASSWORD }}

      # 🔍 Find the correct built JAR dynamically
      - name: Locate built JAR
        id: find_jar
        run: |
          JAR=$(ls build/libs/*.jar | head -n 1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR"

      # 📦 Optional artifact backup (still zipped by GitHub)
      - name: Archive PowerNukkitX artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: PowerNukkitX
          path: ${{ steps.find_jar.outputs.jar_path }}

      # 🚀 Release (direct .jar download, no zip)
      - name: Release latest snapshot
        uses: xotl/cool-github-releases@v1.1.10
        if: success() && contains(github.ref_name, 'master')
        with:
          mode: update
          isPrerelease: false
          tag_name: snapshot
          release_name: "Latest Snapshot"
          assets: ${{ steps.find_jar.outputs.jar_path }}
          replace_assets: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
